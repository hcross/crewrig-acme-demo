version: '3'

vars:
  GEMINI_HOME: "{{.HOME}}/.gemini"
  REPO_DIR: "{{.PWD}}"
  E2E_IMG_PREFIX: "crewrig/e2e"
  E2E_DOCKER_DIR: "{{.REPO_DIR}}/docker/e2e"
  E2E_VERSIONS_LOCK: "{{.REPO_DIR}}/docker/e2e/.versions.lock"

tasks:
  default:
    cmd: task --list

  setup-gemini-interactive:
    desc: Interactive setup with team/expertise/level selection
    preconditions:
      - sh: command -v fzf >/dev/null 2>&1
        msg: "fzf is required. Install with: brew install fzf (macOS) or apt-get install fzf (Linux)"
    cmd: bash {{.REPO_DIR}}/scripts/setup-gemini-interactive.sh

  install-mempalace:
    desc: Install or upgrade MemPalace at the pinned version (>=3.3.3,<3.4)
    preconditions:
      - sh: command -v pipx >/dev/null 2>&1
        msg: "pipx is required. Install with: brew install pipx (macOS) or apt-get install pipx (Linux)"
    cmd: pipx install --force 'mempalace>=3.3.3,<3.4'

  setup:playwright-mcp:
    desc: "Install the Playwright MCP server globally (opt-in). Registers @playwright/mcp in Claude Code and Gemini CLI user-scope config. Idempotent — safe to re-run."
    cmds:
      - |
        echo "Registering Playwright MCP server in Claude Code (user scope)..."
        if claude mcp list 2>/dev/null | grep -q "playwright"; then
          echo "  Already registered in Claude Code — skipping."
        else
          claude mcp add playwright npx @playwright/mcp@latest --scope user
          echo "  Registered."
        fi
      - |
        echo "Registering Playwright MCP server in Gemini CLI (global config)..."
        GEMINI_SETTINGS="${HOME}/.gemini/settings.json"
        if [ -f "$GEMINI_SETTINGS" ] && grep -q '"playwright"' "$GEMINI_SETTINGS" 2>/dev/null; then
          echo "  Already registered in Gemini CLI — skipping."
        else
          python3 -c "
        import json, os
        path = os.path.expanduser('~/.gemini/settings.json')
        if not os.path.exists(path):
          print('  Gemini CLI config not found — skipping.')
          raise SystemExit(0)
        cfg = json.load(open(path))
        cfg.setdefault('mcpServers', {})['playwright'] = {'command': 'npx', 'args': ['@playwright/mcp@latest']}
        json.dump(cfg, open(path, 'w'), indent=2)
        print('  Registered.')
        " || echo "  Gemini CLI registration failed — check ~/.gemini/settings.json manually."
        fi

  install-workspace:
    desc: Install all community-config components (copy mode)
    cmd: bash {{.REPO_DIR}}/scripts/install-workspace.sh install

  link-workspace:
    desc: Link all community-config components (symlink mode, for development)
    cmd: bash {{.REPO_DIR}}/scripts/install-workspace.sh link

  install-component:
    desc: "Install a single component (task install-component TYPE=skills NAME=my-skill)"
    cmd: bash {{.REPO_DIR}}/scripts/manage-workspace-component.sh install {{.TYPE}} {{.NAME}}

  link-component:
    desc: "Link a single component (task link-component TYPE=skills NAME=my-skill)"
    cmd: bash {{.REPO_DIR}}/scripts/manage-workspace-component.sh link {{.TYPE}} {{.NAME}}

  unlink-component:
    desc: "Remove a component from ~/.gemini (task unlink-component TYPE=skills NAME=my-skill)"
    cmd: bash {{.REPO_DIR}}/scripts/unlink-component.sh {{.TYPE}} {{.NAME}}

  install-copilot-component:
    desc: "Install a Copilot component (task install-copilot-component TYPE=skills NAME=my-skill)"
    cmd: bash {{.REPO_DIR}}/scripts/manage-copilot-component.sh install {{.TYPE}} {{.NAME}}

  link-copilot-component:
    desc: "Link a Copilot component (task link-copilot-component TYPE=skills NAME=my-skill)"
    cmd: bash {{.REPO_DIR}}/scripts/manage-copilot-component.sh link {{.TYPE}} {{.NAME}}

  install-deps:
    desc: Install npm dependencies for all extensions
    cmd: npm install

  install-extensions:
    desc: Install all extensions (copy mode)
    cmd: bash {{.REPO_DIR}}/scripts/install-extension.sh install

  install-extension:
    desc: "Install a single extension (task install-extension EXT=hello-world)"
    cmd: bash {{.REPO_DIR}}/scripts/install-extension.sh install {{.EXT}}

  link-extensions:
    desc: Link all extensions (symlink mode, for development)
    cmd: bash {{.REPO_DIR}}/scripts/link-extensions.sh

  unlink-extensions:
    desc: Remove all installed extensions
    cmd: bash {{.REPO_DIR}}/scripts/unlink-extensions.sh

  package:
    desc: Package all extensions to dist/
    deps: [install-deps]
    cmd: bash {{.REPO_DIR}}/scripts/package-extensions.sh

  package-extension:
    desc: "Package a single extension (task package-extension EXT=hello-world)"
    cmd: bash {{.REPO_DIR}}/scripts/package-extension.sh

  create-extension:
    desc: "Scaffold a new extension from skeleton (task create-extension NAME=my-ext)"
    preconditions:
      - sh: command -v fzf >/dev/null 2>&1
        msg: "fzf is required. Install with: brew install fzf (macOS) or apt-get install fzf (Linux)"
    cmd: bash {{.REPO_DIR}}/scripts/create-extension.sh

  # --- Claude Code tasks ---

  setup-claude-interactive:
    desc: Interactive Claude Code setup with team/expertise/level selection (copy by default)
    preconditions:
      - sh: command -v fzf >/dev/null 2>&1
        msg: "fzf is required. Install with: brew install fzf (macOS) or apt-get install fzf (Linux)"
    cmd: bash {{.REPO_DIR}}/scripts/setup-claude-interactive.sh

  import-claude-history:
    desc: Backfill MemPalace with pre-existing Claude Code transcripts from ~/.claude/projects (idempotent)
    preconditions:
      - sh: command -v fzf >/dev/null 2>&1
        msg: "fzf is required. Install with: brew install fzf (macOS) or apt-get install fzf (Linux)"
    cmd: bash {{.REPO_DIR}}/scripts/import-claude-history.sh

  import-gemini-history:
    desc: Backfill MemPalace with pre-existing Gemini CLI transcripts from ~/.gemini/tmp (idempotent)
    preconditions:
      - sh: command -v fzf >/dev/null 2>&1
        msg: "fzf is required. Install with: brew install fzf (macOS) or apt-get install fzf (Linux)"
    cmd: bash {{.REPO_DIR}}/scripts/import-gemini-history.sh

  install-claude-workspace:
    desc: Install all community-config Claude Code components (copy mode)
    cmd: bash {{.REPO_DIR}}/scripts/manage-claude-component.sh install claude-skills

  link-claude-workspace:
    desc: Link all community-config Claude Code components (symlink mode — dev only)
    cmd: bash {{.REPO_DIR}}/scripts/manage-claude-component.sh link claude-skills

  install-claude-component:
    desc: "Install a single Claude Code component (task install-claude-component TYPE=claude-skills NAME=my-skill)"
    cmd: bash {{.REPO_DIR}}/scripts/manage-claude-component.sh install {{.TYPE}} {{.NAME}}

  link-claude-component:
    desc: "Link a single Claude Code component (task link-claude-component TYPE=claude-skills NAME=my-skill)"
    cmd: bash {{.REPO_DIR}}/scripts/manage-claude-component.sh link {{.TYPE}} {{.NAME}}

  build-claude-plugin:
    desc: "Build a Claude Code plugin from an extension (task build-claude-plugin EXT=hello-world)"
    cmd: bash {{.REPO_DIR}}/scripts/build-claude-plugin.sh {{.REPO_DIR}}/extensions/{{.EXT}}

  install-claude-plugin:
    desc: "Install a Claude Code plugin (task install-claude-plugin EXT=hello-world)"
    cmd: bash {{.REPO_DIR}}/scripts/install-claude-plugin.sh {{.EXT}}

  # --- GitHub Copilot CLI tasks ---

  setup-copilot-interactive:
    desc: Interactive GitHub Copilot CLI setup (workspace settings + optional transcript hooks)
    preconditions:
      - sh: command -v fzf >/dev/null 2>&1
        msg: "fzf is required. Install with: brew install fzf (macOS) or apt-get install fzf (Linux)"
    cmd: bash {{.REPO_DIR}}/scripts/setup-copilot-interactive.sh

  import-copilot-history:
    desc: Backfill MemPalace with pre-existing GitHub Copilot CLI transcripts from ~/.copilot/session-state (idempotent)
    preconditions:
      - sh: command -v fzf >/dev/null 2>&1
        msg: "fzf is required. Install with: brew install fzf (macOS) or apt-get install fzf (Linux)"
    cmd: bash {{.REPO_DIR}}/scripts/import-copilot-history.sh

  build-components-copilot:
    desc: Build community components for GitHub Copilot CLI only
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install with: brew install yq"
    cmd: bash {{.REPO_DIR}}/scripts/build-components.sh --target copilot

  # --- Community component build ---

  build-components:
    desc: Build all community components for Gemini CLI, Claude Code, and GitHub Copilot CLI
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install with: brew install yq"
    cmd: bash {{.REPO_DIR}}/scripts/build-components.sh --target all

  build-components-gemini:
    desc: Build community components for Gemini CLI only
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install with: brew install yq"
    cmd: bash {{.REPO_DIR}}/scripts/build-components.sh --target gemini

  build-components-claude:
    desc: Build community components for Claude Code only
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install with: brew install yq"
    cmd: bash {{.REPO_DIR}}/scripts/build-components.sh --target claude

  check-components:
    desc: Check that generated community components match source (drift detection)
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install with: brew install yq"
    cmd: bash {{.REPO_DIR}}/scripts/build-components.sh --target all --check

  test-components:
    desc: Test the build-components canonical_repo validator
    cmd: bash {{.REPO_DIR}}/scripts/test-build-components.sh

  # --- Linting ---

  lint-markdown:
    desc: Check all Markdown files for lint compliance
    preconditions:
      - sh: command -v markdownlint >/dev/null 2>&1
        msg: "markdownlint-cli is required. Install with: npm install -g markdownlint-cli"
    cmd: markdownlint "**/*.md" --ignore node_modules --ignore extension-skeleton

  spec:lint:
    desc: "Lint spec files for format compliance (markdown + custom semantic rules)"
    cmd: node {{.REPO_DIR}}/scripts/lib/spec-linter.js {{.CLI_ARGS}}

  fix-markdown:
    desc: Auto-fix Markdown formatting issues
    preconditions:
      - sh: command -v markdownlint >/dev/null 2>&1
        msg: "markdownlint-cli is required. Install with: npm install -g markdownlint-cli"
    cmd: markdownlint "**/*.md" --ignore node_modules --ignore extension-skeleton --fix

  # --- Transcript Management ---

  prune-transcripts:
    desc: "Prune old transcripts from MemPalace (task prune-transcripts -- --days 30 [--apply])"
    cmd: bash {{.REPO_DIR}}/scripts/prune-transcripts.sh {{.CLI_ARGS}}

  # --- Harness Feedback Loop ---

  harness-curate:
    desc: "Run the Harness Curator (task harness-curate -- [--apply | --from-stdin])"
    cmd: bash {{.REPO_DIR}}/community-config/skills/harness-curator/scripts/curate.sh {{.CLI_ARGS}}

  test-harness-curate:
    desc: "Smoke-test the Harness Curator against the bundled fixture"
    cmd: bash {{.REPO_DIR}}/community-config/skills/harness-curator/scripts/test.sh

  check-skill-versions:
    desc: "Enforce provenance.version bump on changed skill/agent sources (local mirror of the CI guard)"
    cmd: bash {{.REPO_DIR}}/scripts/check-skill-versions.sh

  skill:check:
    desc: "Verify built skill (+ optional agent) mirrors for one component across .claude/, .gemini/, .github/. Usage: task skill:check NAME=<skill-name>"
    silent: true
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install with: brew install yq"
    cmds:
      - |
        set -euo pipefail
        NAME='{{.NAME}}'
        if [ -z "$NAME" ]; then
          echo "ERROR: NAME is required. Usage: task skill:check NAME=<skill-name>" >&2
          exit 2
        fi

        # fail <message> [remediation-hint]
        # The remediation hint is optional and context-specific. Callers
        # whose failure is best resolved by rebuilding pass the build-script
        # hint explicitly; failures unrelated to the build pipeline (e.g.
        # malformed Gemini provenance comment) pass their own pointer or
        # omit it entirely.
        fail() {
          echo "FAIL: $1" >&2
          if [ -n "${2:-}" ]; then
            echo "Remediation: $2" >&2
          fi
          exit 1
        }

        check_yaml_field() {
          # $1: file, $2: yq path, $3: human-readable label
          local file="$1" path="$2" label="$3"
          local val
          val="$(yq eval --front-matter=extract "$path" "$file" 2>/dev/null || true)"
          if [ -z "$val" ] || [ "$val" = "null" ]; then
            fail "$file — missing or empty YAML field $label" "rebuild with \`bash scripts/build-components.sh\`."
          fi
        }

        check_skill_mirror() {
          local file="$1"
          [ -s "$file" ] || fail "$file — missing or empty" "rebuild with \`bash scripts/build-components.sh\`."
          yq eval --front-matter=extract '.' "$file" >/dev/null 2>&1 \
            || fail "$file — YAML frontmatter does not parse" "rebuild with \`bash scripts/build-components.sh\`."
          check_yaml_field "$file" '.name' 'name'
          check_yaml_field "$file" '.metadata.provenance.version' 'metadata.provenance.version'
        }

        # --- Skill mirrors (mandatory across all three CLIs) ---
        for path in ".claude/skills/${NAME}/SKILL.md" \
                    ".gemini/skills/${NAME}/SKILL.md" \
                    ".github/skills/${NAME}/SKILL.md"; do
          check_skill_mirror "$path"
        done

        # --- Agent mirrors (optional, but must be symmetric when present) ---
        CLAUDE_AGENT=".claude/agents/${NAME}/AGENT.md"
        GEMINI_AGENT=".gemini/agents/${NAME}.md"
        COPILOT_AGENT=".github/agents/${NAME}.md"
        present=0
        for path in "$CLAUDE_AGENT" "$GEMINI_AGENT" "$COPILOT_AGENT"; do
          [ -e "$path" ] && present=$((present + 1))
        done

        if [ "$present" -ne 0 ] && [ "$present" -ne 3 ]; then
          missing=""
          for path in "$CLAUDE_AGENT" "$GEMINI_AGENT" "$COPILOT_AGENT"; do
            [ -e "$path" ] || missing="$missing $path"
          done
          fail "agent mirrors are asymmetric — present on $present/3 paths; missing:$missing" "rebuild with \`bash scripts/build-components.sh\`."
        fi

        if [ "$present" -eq 3 ]; then
          # Claude + Copilot — YAML-internal provenance
          for file in "$CLAUDE_AGENT" "$COPILOT_AGENT"; do
            [ -s "$file" ] || fail "$file — missing or empty" "rebuild with \`bash scripts/build-components.sh\`."
            yq eval --front-matter=extract '.' "$file" >/dev/null 2>&1 \
              || fail "$file — YAML frontmatter does not parse" "rebuild with \`bash scripts/build-components.sh\`."
            check_yaml_field "$file" '.name' 'name'
            check_yaml_field "$file" '.metadata.provenance.version' 'metadata.provenance.version'
          done

          # Gemini — YAML name + HTML-comment provenance line after frontmatter
          [ -s "$GEMINI_AGENT" ] || fail "$GEMINI_AGENT — missing or empty" "rebuild with \`bash scripts/build-components.sh\`."
          yq eval --front-matter=extract '.' "$GEMINI_AGENT" >/dev/null 2>&1 \
            || fail "$GEMINI_AGENT — YAML frontmatter does not parse" "rebuild with \`bash scripts/build-components.sh\`."
          check_yaml_field "$GEMINI_AGENT" '.name' 'name'
          # The provenance line must appear immediately after the closing `---` of the frontmatter.
          # yq's --front-matter=extract strips frontmatter; awk to find the first non-frontmatter line.
          first_body_line="$(awk '
            BEGIN { in_fm = 0; seen_open = 0 }
            /^---[[:space:]]*$/ {
              if (seen_open == 0) { seen_open = 1; in_fm = 1; next }
              if (in_fm == 1)     { in_fm = 0; next }
            }
            in_fm == 1 { next }
            seen_open == 1 && in_fm == 0 && NF > 0 { print; exit }
          ' "$GEMINI_AGENT")"
          echo "$first_body_line" | grep -qE '^<!-- crewrig-provenance: version="[^"]+"' \
            || fail "$GEMINI_AGENT — missing HTML-comment provenance line (\`<!-- crewrig-provenance: version=\"…\" … -->\`) immediately after YAML frontmatter" "rebuild with \`bash scripts/build-components.sh\`."
        fi

        echo "${NAME}: OK across .claude/, .gemini/, .github/"

  # --- e2e Docker images (issue #76) ---

  e2e:build:
    desc: "Build all e2e images (base + claude + gemini + copilot + mempalace) and refresh .versions.lock."
    cmds:
      - task: e2e:build:base
      - task: e2e:build:claude
      - task: e2e:build:gemini
      - task: e2e:build:copilot
      - task: e2e:build:mempalace
      - task: e2e:lock

  e2e:build:base:
    desc: "Build the shared e2e base image (crewrig/e2e-base:latest)."
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: "docker is required."
    cmd: docker build -t {{.E2E_IMG_PREFIX}}-base:latest -f {{.E2E_DOCKER_DIR}}/base.Dockerfile {{.E2E_DOCKER_DIR}}

  e2e:build:claude:
    desc: "Build the Claude Code e2e image (crewrig/e2e-claude:latest)."
    deps: [e2e:build:base]
    cmd: docker build -t {{.E2E_IMG_PREFIX}}-claude:latest -f {{.E2E_DOCKER_DIR}}/claude.Dockerfile {{.E2E_DOCKER_DIR}}

  e2e:build:gemini:
    desc: "Build the Gemini CLI e2e image (crewrig/e2e-gemini:latest)."
    deps: [e2e:build:base]
    cmd: docker build -t {{.E2E_IMG_PREFIX}}-gemini:latest -f {{.E2E_DOCKER_DIR}}/gemini.Dockerfile {{.E2E_DOCKER_DIR}}

  e2e:build:copilot:
    desc: "Build the GitHub Copilot CLI e2e image (crewrig/e2e-copilot:latest)."
    deps: [e2e:build:base]
    cmd: docker build -t {{.E2E_IMG_PREFIX}}-copilot:latest -f {{.E2E_DOCKER_DIR}}/copilot.Dockerfile {{.E2E_DOCKER_DIR}}

  e2e:build:mempalace:
    desc: "Build the MemPalace sidecar e2e image (crewrig/e2e-mempalace:latest)."
    deps: [e2e:build:base]
    cmd: docker build -t {{.E2E_IMG_PREFIX}}-mempalace:latest -f {{.E2E_DOCKER_DIR}}/mempalace.Dockerfile {{.E2E_DOCKER_DIR}}

  e2e:lock:
    desc: "Capture resolved CLI/tool versions from the built images into docker/e2e/.versions.lock."
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: "docker is required."
    cmd: bash {{.REPO_DIR}}/scripts/e2e-capture-versions.sh "{{.E2E_IMG_PREFIX}}" "{{.E2E_VERSIONS_LOCK}}"

  # --- e2e dedicated-account auth flow (issue #77) ---

  e2e:auth:claude:
    desc: "Interactive Claude Code login → ~/.crewrig-e2e/claude/ (RW one-shot, RO at scenario time)."
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: "docker is required."
      - sh: docker image inspect {{.E2E_IMG_PREFIX}}-claude:latest >/dev/null 2>&1
        msg: "image {{.E2E_IMG_PREFIX}}-claude:latest is missing. Run `task e2e:build:claude` first."
    cmd: bash {{.REPO_DIR}}/scripts/e2e/auth-claude.sh

  e2e:auth:gemini:
    desc: "Interactive Gemini CLI login → ~/.crewrig-e2e/gemini/ (RW one-shot, RO at scenario time)."
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: "docker is required."
      - sh: docker image inspect {{.E2E_IMG_PREFIX}}-gemini:latest >/dev/null 2>&1
        msg: "image {{.E2E_IMG_PREFIX}}-gemini:latest is missing. Run `task e2e:build:gemini` first."
    cmd: bash {{.REPO_DIR}}/scripts/e2e/auth-gemini.sh

  e2e:auth:copilot:
    desc: "Guidance for Copilot CLI auth via PAT (env-var COPILOT_GITHUB_TOKEN). Runs a sanity check if the token is already set."
    cmd: bash {{.REPO_DIR}}/scripts/e2e/auth-copilot.sh

  e2e:auth:ollama:
    desc: "Interactive Ollama Cloud signin → ~/.crewrig-e2e/ollama/ (RW one-shot, RO at scenario time). Required only when local.toml routes Copilot through Ollama Cloud."
    preconditions:
      - sh: command -v docker >/dev/null 2>&1
        msg: "docker is required."
      - sh: docker image inspect {{.E2E_IMG_PREFIX}}-copilot:latest >/dev/null 2>&1
        msg: "image {{.E2E_IMG_PREFIX}}-copilot:latest is missing. Run `task e2e:build:copilot` first."
    cmd: bash {{.REPO_DIR}}/scripts/e2e/auth-ollama.sh

  # --- e2e runner + TOML config (issue #78) ---

  e2e:test:
    desc: "Run all e2e scenarios across all configured CLIs (TAP report)."
    cmd: bash {{.REPO_DIR}}/tests/e2e/run.sh {{.CLI_ARGS}}

  e2e:test:scenario:
    desc: "Run one scenario across all configured CLIs. Usage: task e2e:test:scenario -- <scenario-name>"
    cmd: bash {{.REPO_DIR}}/tests/e2e/run.sh --scenario {{.CLI_ARGS}}

  e2e:test:cli:
    desc: "Run all scenarios against one CLI. Usage: task e2e:test:cli -- <claude|gemini|copilot>"
    cmd: bash {{.REPO_DIR}}/tests/e2e/run.sh --cli {{.CLI_ARGS}}

  e2e:report:
    desc: "Aggregate TAP results into a parity matrix (console + markdown)"
    cmd: bash {{.REPO_DIR}}/tests/e2e/lib/report.sh
