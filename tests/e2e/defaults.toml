# tests/e2e/defaults.toml — committed defaults for the e2e runner.
#
# Schema overview (see docs/adr/0003-e2e-runner-toml.md for the full contract):
#
#   [cli.<name>]
#     image         = "<docker-image-tag>"      # required
#     command       = ["<argv0>", "<arg1>"]     # required
#     command_args  = ["<extra>", ...]          # optional, default []
#     mounts        = ["host:container[:mode]"] # required, may be []
#     env_keys      = ["VAR_NAME", ...]         # required, may be []
#
#   [scenarios.<name>]                          # populated by issue #80
#     description  = "..."
#     command_args = [...]
#     applies_to   = ["claude", "gemini", "copilot"]
#
# Path interpolation:
#   The literal token "${CREWRIG_E2E_HOME}" in mount strings is replaced by
#   the runner at execution time with the host's e2e home dir
#   (typically "$HOME/.crewrig-e2e", overridable via $CREWRIG_E2E_HOME).
#   This keeps the committed defaults portable across machines.
#
# Local overrides:
#   Copy tests/e2e/local.toml.example to tests/e2e/local.toml (gitignored)
#   to override any field. Arrays APPEND, scalars REPLACE, new tables graft
#   in. See ADR 0003 Decision 2 for the full merge semantics.

[cli.claude]
image        = "crewrig/e2e-claude:latest"
command      = ["claude"]
command_args = []
mounts       = [
  "${CREWRIG_E2E_HOME}/claude:/home/agent/.claude:ro",
  "${CREWRIG_E2E_HOME}/claude/.claude.json:/home/agent/.claude.json:ro"
]
env_keys     = ["ANTHROPIC_API_KEY"]

[cli.gemini]
image        = "crewrig/e2e-gemini:latest"
command      = ["gemini"]
command_args = []
mounts       = [
  "${CREWRIG_E2E_HOME}/gemini:/home/agent/.gemini:ro",
  # File-over-dir override: replaces settings.json inside the :ro dir mount
  # with an empty object so gemini -p falls back to GEMINI_API_KEY from env
  # instead of the oauth-personal auth type that blocks headless containers.
  # Created by `task e2e:auth:gemini` (auth-gemini.sh). See issue #136.
  "${CREWRIG_E2E_HOME}/gemini/settings-headless.json:/home/agent/.gemini/settings.json:ro"
]
env_keys     = ["GEMINI_API_KEY"]

[cli.copilot]
# Copilot uses the env-var auth path (ADR 0002 Decision 4); no on-disk creds,
# so `mounts` is intentionally empty. COPILOT_GITHUB_TOKEN is the canonical
# var; GH_TOKEN is honored as a fallback by e2e_auth_ready (see ADR 0002).
image        = "crewrig/e2e-copilot:latest"
command      = ["copilot"]
command_args = []
mounts       = []
env_keys     = ["COPILOT_GITHUB_TOKEN"]

# [judge] — LLM-as-judge wrapper config (see ADR 0004 Decision 4 and
# tests/e2e/lib/llm_judge.sh). All fields are overridable via local.toml.
# `api_key_env` is intentionally distinct from `ANTHROPIC_API_KEY` so the
# judge's billing/quota line stays separated from the runtime CLI key
# (which may point at the same upstream key value — separation is about
# accounting, not secrecy).
[judge]
backend     = "anthropic"                    # Selects tests/e2e/lib/llm_judge_drivers/<backend>.sh.
model       = "claude-sonnet-4-6"            # Update when a newer stable Sonnet ships.
api_key_env = "ANTHROPIC_JUDGE_API_KEY"
auth_mode   = "api_key"                      # "api_key" (default) | "oauth" — see ADR 0008. Only honored by drivers that branch on it (e.g. claude-code).
# gcp_project = ""                       # Optional Google Cloud project; forwarded as x-goog-user-project when set.
endpoint    = "https://api.anthropic.com/v1/messages"
max_tokens  = 256
strict      = false                          # UNCERTAIN warns; does NOT fail.
temperature = 0.0                            # Forwarded to the backend driver. Deterministic by default.
max_calls   = 30                             # Per-run hard cap on Messages API calls.

# [scenarios.*] — the four pillar scenarios (issue #80, ADR 0005).
#
# Each scenario owns a host-side orchestrator at
# tests/e2e/scenarios/<name>/run.sh. The runner exports the env-var
# contract (E2E_LIB_DIR, E2E_REPORT_DIR, E2E_CLI, E2E_IMAGE,
# E2E_EFFECTIVE_JSON, E2E_CREWRIG_E2E_HOME, E2E_SCENARIO_DIR,
# E2E_RUN_ID) and delegates. `command_args` is intentionally omitted —
# scenarios assemble their own docker argv.

[scenarios.01-layered-context]
description = "00-60 rule files steer the CLI's profile-aware answer (location probe)."
applies_to  = ["claude", "gemini", "copilot"]

[scenarios.02-cross-tool-memory]
description = "A drawer written by CLI A is read by CLI B via a shared MemPalace sidecar."
applies_to  = ["claude", "gemini"]

[scenarios.03-skill-build]
description = "scripts/build-components.sh emits CLI-specific artefacts inside the container."
applies_to  = ["claude", "gemini", "copilot"]

[scenarios.04-harness-loop]
description = "harness-report → MemPalace → harness-curator round-trip."
applies_to  = ["claude", "gemini", "copilot"]
