name: MCP Security Check

on:
  pull_request:
    branches: [main]
    paths:
      - "**/package.json"
      - "**/settings.json"
      - "**/mcp.json"
      - "**/mcp.json.template"
      - "**/extension.json"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      # audit-level intentionally set to `critical` (was `high`, see commit
      # 9f05139). Direct dependency vulnerabilities are pinned via npm
      # `overrides` in package.json (picomatch ^4.0.4, brace-expansion ^2.0.3).
      # The remaining moderate/high findings are inside npm's bundled
      # node_modules (picomatch@4.0.3, brace-expansion@5.0.4) — out of our
      # control until upstream bumps. Drop back to `high` once npm itself
      # ships fixed bundled deps.
      - name: Run security audit
        run: npm audit --audit-level=critical
