name: Build & Validate

on:
  pull_request:
    branches: [main, "release/**"]
  push:
    branches: [main, "release/**"]
    tags-ignore:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build all extensions
        run: npm run build --workspaces --if-present

  check-components:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # The extension pivot carrier round-trip test validates the rendered .toml
      # via python3/tomllib (Python >= 3.11). ubuntu-latest ships Python 3.12,
      # but pin it explicitly so the toolchain prerequisite is declared, not
      # incidental (spec 0042 PLAN v2, finding F6).
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check community component drift
        run: bash scripts/build-components.sh --target all --check

      - name: Test build-components validator
        run: bash scripts/test-build-components.sh

      - name: Test extract_frontmatter regression
        run: bash scripts/tests/test-extract-frontmatter.sh

      - name: Test check-skill-versions regression
        run: bash scripts/tests/test-check-skill-versions.sh

      - name: Test check-feedback-routing regression (spec 0030)
        run: bash scripts/tests/test-check-feedback-routing.sh

      - name: Enforce extension pivot sourcing (spec 0042)
        run: bash scripts/check-extension-pivot.sh

      - name: Test check-extension-pivot regression (spec 0042)
        run: bash scripts/tests/test-check-extension-pivot.sh

      - name: Test build-extension-pivot renderer + carrier (spec 0042)
        run: bash scripts/tests/test-build-extension-pivot.sh

      - name: Check extension pivot .toml drift (spec 0042)
        run: bash scripts/build-extension-pivot.sh --check

      - name: Enforce extension provenance (spec 0043)
        run: bash scripts/check-extension-provenance.sh

      - name: Test check-extension-provenance regression (spec 0043)
        run: bash scripts/tests/test-check-extension-provenance.sh

      - name: Enforce extension manifest single-version (spec 0044)
        run: bash scripts/check-extension-manifest-version.sh

      - name: Test check-extension-manifest-version regression (spec 0044)
        run: bash scripts/tests/test-check-extension-manifest-version.sh

      - name: Test check-extension-version-bump regression (spec 0044)
        run: bash scripts/tests/test-check-extension-version-bump.sh

      - name: Test Gemini agent frontmatter contract (issue #54)
        run: bash scripts/tests/test-gemini-agent-frontmatter.sh

      - name: Test e2e auth .claude.json mount (issue #112)
        run: bash scripts/tests/test-e2e-auth-claude-json.sh

      - name: Test e2e auth Ollama Cloud mount (issue #114)
        run: bash scripts/tests/test-e2e-auth-ollama.sh

      - name: Test sync-from-upstream script
        run: bash scripts/tests/test-sync-from-upstream.sh

      - name: Check core-paths resolve at HEAD (spec 0031)
        run: bash scripts/check-core-paths.sh

      - name: Test check-core-paths regression (spec 0031)
        run: bash scripts/tests/test-check-core-paths.sh

      - name: Test assembly verification
        run: bash scripts/tests/test-assembly-verification.sh

      - name: Test artifact build/install scope (spec 0019)
        run: bash scripts/tests/test-artifact-build-install-scope.sh

      - name: Check docs index drift (spec 0027)
        run: bash scripts/build-docs-index.sh --check

      - name: Test build-docs-index regression (spec 0027)
        run: bash scripts/tests/test-build-docs-index.sh

  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        # extensions/**/commands/*.md are pivot command SOURCES whose body IS the
        # rendered command prompt, not prose — linting them as documents (e.g.
        # MD041 first-line-heading) would force a cosmetic heading that leaks
        # into the prompt. Exclude them; every other extension .md (skills,
        # agents, context, README) stays linted (spec 0042).
        run: markdownlint "**/*.md" --ignore node_modules --ignore extension-skeleton --ignore communication --ignore 'extensions/**/commands/*.md'

  lint-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Task
        run: sudo sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Lint specs
        run: task spec:lint

  test-harness-curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Smoke-test harness curator
        run: bash artifacts/library/skills/harness-curator/scripts/test.sh

  check-skill-versions:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the base ref resolves

      - name: Enforce version bump on changed skill/agent sources
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: bash scripts/check-skill-versions.sh

  check-extension-version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so `git show BASE:path` resolves the old carrier

      - name: Enforce carrier-version bump on changed extension sources (spec 0044)
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: bash scripts/check-extension-version-bump.sh

  check-agents-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check AGENTS.md file size
        run: bash scripts/check-agents-size.sh

  check-feedback-routing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Enforce upstream-tier feedback routing (spec 0030)
        run: bash scripts/check-feedback-routing.sh
