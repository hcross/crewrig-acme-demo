    - chmod +x /usr/local/bin/yq
  script:
    - "bash scripts/build-components.sh --target all --check"
    - "bash scripts/test-build-components.sh"
    - "bash scripts/tests/test-extract-frontmatter.sh"
    - "bash scripts/tests/test-check-skill-versions.sh"
    - "bash scripts/tests/test-check-feedback-routing.sh"
    - "bash scripts/check-extension-pivot.sh"
    - "bash scripts/tests/test-check-extension-pivot.sh"
    - "bash scripts/tests/test-build-extension-pivot.sh"
    - "bash scripts/build-extension-pivot.sh --check"
    - "bash scripts/check-extension-provenance.sh"
    - "bash scripts/tests/test-check-extension-provenance.sh"
    - "bash scripts/check-extension-manifest-version.sh"
    - "bash scripts/tests/test-check-extension-manifest-version.sh"
    - "bash scripts/tests/test-check-extension-version-bump.sh"
    - "bash scripts/tests/test-install-claude-plugin-marketplace.sh"
    - "bash scripts/tests/test-gemini-agent-frontmatter.sh"
    - "bash scripts/tests/test-e2e-auth-claude-json.sh"
    - "bash scripts/tests/test-e2e-auth-ollama.sh"
    - "bash scripts/tests/test-sync-from-upstream.sh"
    - "bash scripts/check-core-paths.sh"
    - "bash scripts/tests/test-check-core-paths.sh"
    - "bash scripts/tests/test-check-ci-parity.sh"
    - "bash scripts/tests/test-assembly-verification.sh"
    - "bash scripts/tests/test-artifact-build-install-scope.sh"
    - "bash scripts/build-docs-index.sh --check"
    - "bash scripts/tests/test-build-docs-index.sh"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^main$|^release\//'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^main$|^release\//'

lint-markdown:
